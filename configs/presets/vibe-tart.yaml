---
preset:
  name: vibe-tart
  description: "Vibe Development with Docker plus native macOS Tart on Apple Silicon"

provider: tart

vm:
  box: '@vibe-box'
  cpus: 6
  memory: 8192
  swap: 2048
  user: developer

project:
  workspace_path: /workspace

host_sync:
  git_config: true
  ai_tools: true

npm_packages:
  - '@google/gemini-cli'
  - '@openai/codex'

networking:
  networks:
    - spacebase

terminal:
  theme: dracula
  show_git_branch: true

default_profile: tart

profiles:
  docker:
    provider: docker
  tart:
    provider: tart
    project:
      workspace_path: /Users/admin/workspace
    vm:
      box: vibe-tart-base
      memory: 16384
      cpus: 8
    tart:
      guest_os: macos
      disk_size: 80
      ssh_user: admin
      install_docker: false
