version: '2.0'
provider: tart
os: auto
project:
  hostname: dev.vm.local
  name: vm
  workspace_path: /workspace
vm:
  box: '@vibe-box'
  cpus: 6
  gui: false
  memory: 8192
  port_binding: 127.0.0.1
  swap: 2048
  swappiness: 60
  timezone: auto
  user: developer
ports:
  _range: [3120, 3129]
npm_packages:
  - '@google/gemini-cli'
  - '@openai/codex'
terminal:
  show_git_branch: true
  show_timestamp: false
  theme: dracula
  username: vm-dev
environment:
  CARGO_TARGET_DIR: /home/admin/.cache/vm-cargo-target
host_sync:
  git_config: true
  ai_tools: true
preset: vibe-tart
default_profile: tart
networking:
  networks:
  - spacebase
profiles:
  docker:
    provider: docker
    ports: {}
  linux:
    provider: tart
    tart:
      guest_os: linux
      disk_size: 80
      ssh_user: admin
      install_docker: true
    project:
      workspace_path: /workspace
    vm:
      box: vibe-tart-linux-base
      memory: 16384
      cpus: 8
    ports: {}
  tart:
    provider: tart
    tart:
      guest_os: macos
      disk_size: 80
      rosetta: true
      ssh_user: admin
      install_docker: true
    project:
      workspace_path: /workspace
    vm:
      box: vibe-tart-sequoia-base
      memory: 16384
      cpus: 8
    ports: {}
