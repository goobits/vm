---
# Configuration-Driven Development Environment
- name: Setup Development Environment
  hosts: all
  become: yes
  gather_facts: true
  gather_subset:
      - '!all'  # Skip all facts by default
      - '!min'  # Skip minimal fact gathering
      - 'user'  # Only gather user facts (for ansible_user_uid, user_id)
  # Reduces fact gathering from ~3-5s to ~1-2s
  # Note: packages facts are gathered via package_facts module when needed (line 489)
  vars:
      # Default values, will be overridden by config
      default_user: "{{ lookup('env', 'PROJECT_USER') | default('developer') }}"
      default_workspace: '/workspace'
      # Use global temp directory to avoid user permission issues (for snapshots with different UID)
      ansible_remote_tmp: '/tmp'
      ansible_async_dir: '/tmp/.ansible_async'
      # Snapshot mode - skip base system tasks when using pre-provisioned snapshot
      # This variable is passed via --extra-vars from vm tool
      base_preprovisioned: "{{ base_preprovisioned | default(false) | bool }}"
      # Force package refresh - bypass cache and reinstall packages (for security updates)
      # This variable is passed via --extra-vars from vm tool (--refresh-packages flag)
      refresh_packages: "{{ refresh_packages | default(false) | bool }}"

  # Load and process configuration
  pre_tasks:
      - name: Check if running in container
        stat:
            path: /.dockerenv
        register: dockerenv_stat

      - name: Set container fact
        set_fact:
            is_docker_container: "{{ dockerenv_stat.stat.exists }}"

      - name: Check for merged configuration file
        stat:
            path: '/tmp/vm-config.json'
        register: config_file_stat

      - name: Load merged configuration
        set_fact:
            project_config: "{{ lookup('file', '/tmp/vm-config.json') | from_json }}"
        when: config_file_stat.stat.exists

      - name: Use minimal fallback configuration
        set_fact:
            project_config:
                project:
                    name: "{{ ansible_hostname.split('.')[0] | default('project') }}"
                    hostname: "dev.{{ ansible_hostname.split('.')[0] | default('project') }}.local"
                    workspace_path: '{{ default_workspace }}'
                vm:
                    user: '{{ default_user }}'
        when: not config_file_stat.stat.exists

      - name: Check for terminal themes
        stat:
            path: '/app/shared/themes.json'
        register: themes_file_stat

      - name: Load terminal themes
        set_fact:
            terminal_themes: "{{ lookup('file', '/app/shared/themes.json') | from_json }}"
        when: themes_file_stat.stat.exists

      - name: Use fallback Dracula theme
        set_fact:
            terminal_themes:
                dracula:
                    name: 'Dracula'
                    colors:
                        foreground: '#f8f8f2'
                        background: '#282a36'
                        red: '#ff5555'
                        green: '#50fa7b'
                        yellow: '#f1fa8c'
                        blue: '#bd93f9'
                        magenta: '#ff79c6'
                        cyan: '#8be9fd'
                        bright_black: '#6272a4'
        when: not themes_file_stat.stat.exists

      - name: Set derived variables
        set_fact:
            project_name: "{{ project_config.project.name | default('project') }}"
            project_user: '{{ project_config.vm.user | default(default_user) }}'
            project_uid: '{{ lookup("env", "HOST_UID") | default(ansible_user_uid, true) }}'
            project_gid: '{{ lookup("env", "HOST_GID") | default(ansible_user_gid, true) }}'
            project_path: '{{ project_config.project.workspace_path | default(default_workspace) }}'
            project_path_b64: "{{ (project_config.project.workspace_path | default(default_workspace)) | b64encode }}"
            project_hostname: "{{ project_config.project.hostname | default('dev.' + (project_config.project.name | default('project')) + '.local') }}"
            terminal_emoji: "{{ project_config.terminal.emoji | default('🐳') }}"
            terminal_username: "{{ project_config.terminal.username | default('dev') }}"
            terminal_theme_name: "{{ project_config.terminal.theme | default('dracula') }}"
            show_git_branch: '{{ project_config.terminal.show_git_branch | default(true) }}'
            show_timestamp: '{{ project_config.terminal.show_timestamp | default(false) }}'
            terminal_colors: "{{ terminal_themes[project_config.terminal.theme | default('dracula')].colors | default(terminal_themes.dracula.colors) }}"
            project_ports: "{{ project_config.ports | default({}) | dict2items }}"
            home_dir: "/home/{{ project_config.vm.user | default(default_user) }}"
            # AI sync config: host_sync.ai_tools can be boolean (true=all enabled) or object {claude: bool, gemini: bool, ...}
            claude_sync_enabled: "{{ (project_config.host_sync.ai_tools is defined and (project_config.host_sync.ai_tools == true or (project_config.host_sync.ai_tools is mapping and project_config.host_sync.ai_tools.claude | default(false)))) | bool }}"
            gemini_sync_enabled: "{{ (project_config.host_sync.ai_tools is defined and (project_config.host_sync.ai_tools == true or (project_config.host_sync.ai_tools is mapping and project_config.host_sync.ai_tools.gemini | default(false)))) | bool }}"
            codex_sync_enabled: "{{ (project_config.host_sync.ai_tools is defined and (project_config.host_sync.ai_tools == true or (project_config.host_sync.ai_tools is mapping and project_config.host_sync.ai_tools.codex | default(false)))) | bool }}"
            # Consolidated conditions for package manager installation requirements
            # Note: nodejs_required is computed inline to avoid cross-reference issues in set_fact
            nodejs_required: "{{ ((project_config.npm_packages is defined and project_config.npm_packages is not none and project_config.npm_packages | length > 0) or (project_config.host_sync.ai_tools is defined and (project_config.host_sync.ai_tools == true or (project_config.host_sync.ai_tools is mapping and (project_config.host_sync.ai_tools.claude | default(false) or project_config.host_sync.ai_tools.gemini | default(false) or project_config.host_sync.ai_tools.codex | default(false)))))) | bool }}"
            pip_packages_required: "{{ (project_config.pip_packages is defined and project_config.pip_packages | length > 0) | bool }}"
            cargo_packages_required: "{{ (project_config.cargo_packages is defined and project_config.cargo_packages | length > 0) | bool }}"
            apt_packages_required: "{{ (project_config.apt_packages is defined and project_config.apt_packages | length > 0) | bool }}"
            # Environment template configuration
            env_template_configured: "{{ (project_config.project.env_template_path is defined and project_config.project.env_template_path) | bool }}"
            # Consolidated condition for port configurations
            ports_configured: "{{ (project_config.ports is defined and project_config.ports is mapping and project_config.ports | length > 0) | bool }}"

      - name: Initialize shell-safe alias metadata
        set_fact:
            project_aliases: []

      - name: Build shell-safe alias metadata
        set_fact:
            project_aliases: "{{ project_aliases + [{'key': item.key, 'value_b64': ((item.value | string) | b64encode)}] }}"
        loop: "{{ project_config.aliases | default({}) | dict2items }}"
        when:
            - item.key is match('^[A-Za-z_][A-Za-z0-9_-]*$')

      # User creation pre-task
      - name: Ensure project user supplemental groups exist
        group:
            name: '{{ item }}'
            state: present
        loop:
          - sudo
          - docker
        when: ansible_facts['user_id'] == 0
        become: yes

      - name: Ensure project user exists with correct UID/GID
        user:
            name: '{{ project_user }}'
            uid: "{{ project_uid if not base_preprovisioned else omit }}"
            gid: "{{ project_gid if not base_preprovisioned else omit }}"
            home: '/home/{{ project_user }}'
            shell: /bin/bash
            create_home: yes
            groups: sudo,docker
        when: ansible_facts['user_id'] == 0  # Only when running as root
        become: yes

      - name: Read actual project user primary group
        command: id -gn {{ project_user }}
        register: project_user_group_result
        changed_when: false

      - name: Set actual project user ownership facts
        set_fact:
            project_user_group: '{{ project_user_group_result.stdout }}'

      - name: Ensure project user home directory exists
        file:
            path: '/home/{{ project_user }}'
            state: directory
            owner: '{{ project_user }}'
            group: '{{ project_user_group }}'
            mode: '0755'
        become: yes
        when: ansible_facts['user_id'] == 0

  handlers:
      - name: restart postgresql
        systemd:
            name: postgresql
            state: restarted
            daemon_reload: yes
        when: not is_docker_container

      - name: restart redis
        systemd:
            name: redis-server
            state: restarted
        when: not is_docker_container

      - name: restart mongodb
        systemd:
            name: mongod
            state: restarted
            daemon_reload: yes
        when: not is_docker_container

      - name: restart ssh
        systemd:
            name: ssh
            state: restarted
        when: not is_docker_container

      - name: restart audio
        systemd:
            name: pulseaudio
            state: restarted
            scope: user
        when: not is_docker_container

      - name: restart audio
        command: supervisorctl restart audio
        when: is_docker_container

      - name: restart supervisor
        shell: |
          if ! pgrep supervisord > /dev/null; then
            supervisord -c /etc/supervisor/supervisord.conf
            sleep 2
          fi
          supervisorctl reread && supervisorctl update
        when: is_docker_container

  tasks:
      # System configuration
      - name: Set hostname
        hostname:
            name: '{{ project_hostname }}'
        when: not is_docker_container

      - name: Update /etc/hosts with hostname
        lineinfile:
            path: /etc/hosts
            regexp: '^127\.0\.1\.1'
            line: "127.0.1.1 {{ project_hostname }} {{ project_hostname.split('.')[0] }}"
        when: not is_docker_container

      - name: Update /etc/hosts in container
        lineinfile:
            path: /etc/hosts
            regexp: '^127\.0\.1\.1'
            line: "127.0.1.1 {{ project_hostname }} {{ project_hostname.split('.')[0] }}"
        when: is_docker_container

      - name: Update apt cache
        apt:
            update_cache: yes
            cache_valid_time: 3600
            lock_timeout: 300
        when: not base_preprovisioned

      # Install base system packages FIRST (before any configuration)
      - name: Install locale packages
        apt:
            name:
              - locales
              - locales-all
            state: present
            lock_timeout: 300
        when: not base_preprovisioned
        register: locale_install
        retries: 3
        delay: 5
        until: locale_install is succeeded

      - name: Install base system packages
        apt:
            name:
              - curl
              - wget
              - git
              - git-lfs
              - build-essential
              - python3-pip
              - python3-dev
              - python3-venv
              - ufw
              - fail2ban
              - unattended-upgrades
              - python3-psycopg2
              - zsh
              - zsh-syntax-highlighting
              - supervisor
            state: present
            lock_timeout: 300
        when: not base_preprovisioned
        register: base_packages_install
        retries: 3
        delay: 5
        until: base_packages_install is succeeded

      # Locale configuration (skip if pre-provisioned in snapshot)
      - name: Generate en_US.UTF-8 locale
        command: locale-gen en_US.UTF-8
        args:
            creates: /usr/lib/locale/en_US.utf8
        when: not base_preprovisioned

      - name: Set system locale
        copy:
            dest: /etc/default/locale
            content: |
                LANG=en_US.UTF-8
                LANGUAGE=en_US:en
                LC_ALL=en_US.UTF-8
                LC_CTYPE=en_US.UTF-8
            mode: '0644'
        no_log: true
        when: not base_preprovisioned

      # Timezone configuration (unified method for both VM and container)
      # Skip if pre-provisioned - timezone is set in Dockerfile
      - name: Link system timezone
        file:
            src: '/usr/share/zoneinfo/{{ project_config.vm.timezone | default("UTC") }}'
            dest: /etc/localtime
            state: link
            force: yes
        when: not base_preprovisioned

      - name: Write system timezone
        copy:
            dest: /etc/timezone
            content: '{{ project_config.vm.timezone | default("UTC") }}{{ "\n" }}'
            mode: '0644'
        when: not base_preprovisioned

      # Setup supervisor for Docker containers (AFTER it's installed)
      # Skip if pre-provisioned - supervisor is configured in snapshot
      - name: Setup supervisor for Docker containers
        block:
          - name: Create supervisor directories with proper permissions
            file:
              path: "{{ item }}"
              state: directory
              owner: root
              group: root
              mode: '0755'
            loop:
              - /var/log/supervisor
              - /var/run/supervisor

          - name: Configure supervisor for Docker with stdout logging
            copy:
              dest: /etc/supervisor/supervisord.conf
              content: |
                [unix_http_server]
                file=/var/run/supervisor/supervisor.sock
                chmod=0770
                chown=root:root

                [supervisord]
                nodaemon=true
                logfile=/var/log/supervisor/supervisord.log
                logfile_maxbytes=50MB
                logfile_backups=10
                pidfile=/var/run/supervisor/supervisord.pid
                user=root

                [rpcinterface:supervisor]
                supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

                [supervisorctl]
                serverurl=unix:///var/run/supervisor/supervisor.sock

                [include]
                files = /etc/supervisor/conf.d/*.conf
        when: is_docker_container and not base_preprovisioned

      # Security setup - Configure rules first, enable last.
      # Use command because the ufw module lives outside ansible-core.
      - name: Allow SSH (critical - must be first)
        command:
            argv:
              - ufw
              - allow
              - 22/tcp
              - comment
              - Allow SSH access
        register: ufw_ssh_rule
        changed_when: "'Skipping' not in ufw_ssh_rule.stdout"
        when: not is_docker_container

      - name: Allow configured ports from localhost
        command:
            argv:
              - ufw
              - allow
              - from
              - 127.0.0.1
              - to
              - any
              - port
              - '{{ service_item.value.port | string }}'
              - proto
              - tcp
              - comment
              - 'Allow {{ service_item.key }} port'
        loop: "{{ project_config.services | dict2items }}"
        loop_control:
            loop_var: service_item
        register: ufw_localhost_rules
        changed_when: "'Skipping' not in ufw_localhost_rules.stdout"
        when:
            - not is_docker_container
            - service_item.value.port is defined
            - service_item.value.port is not none

      - name: Allow configured ports from host
        command:
            argv:
              - ufw
              - allow
              - from
              - 10.0.2.2
              - to
              - any
              - port
              - '{{ service_item.value.port | string }}'
              - proto
              - tcp
              - comment
              - 'Allow {{ service_item.key }} port from host (NAT gateway)'
        loop: "{{ project_config.services | dict2items }}"
        loop_control:
            loop_var: service_item
        register: ufw_host_rules
        changed_when: "'Skipping' not in ufw_host_rules.stdout"
        when:
            - not is_docker_container
            - service_item.value.port is defined
            - service_item.value.port is not none

      # Install Node.js/npm if npm_packages is defined OR claude_sync/gemini_sync enabled
      - name: Check if NVM is already installed
        stat:
            path: '/home/{{ project_user }}/.nvm/nvm.sh'
        register: nvm_present

      - name: Download NVM installer
        get_url:
            url: "https://raw.githubusercontent.com/nvm-sh/nvm/{{ project_config.versions.nvm | default('v0.40.3') }}/install.sh"
            dest: /tmp/install_nvm.sh
            mode: '0755'
        become_user: '{{ project_user }}'
        when: nodejs_required and not nvm_present.stat.exists | bool

      - name: Install NVM
        shell: /tmp/install_nvm.sh
        args:
            creates: '/home/{{ project_user }}/.nvm/nvm.sh'
        become_user: '{{ project_user }}'
        when: nodejs_required and not nvm_present.stat.exists | bool

      # Change default shell to zsh (skip if pre-provisioned in snapshot)
      - name: Change user shell to zsh
        user:
            name: '{{ project_user }}'
            shell: /usr/bin/zsh
        when: not base_preprovisioned

      - name: Generate .zshrc from template
        template:
            src: /app/shared/templates/zshrc.j2
            dest: '/home/{{ project_user }}/.zshrc'
            owner: '{{ project_user }}'
            group: '{{ project_user_group }}'
            mode: '0644'
        become_user: root

      - name: Ensure project user writable tool directories
        file:
            path: '{{ item }}'
            state: directory
            owner: '{{ project_user }}'
            group: '{{ project_user_group }}'
            mode: '0755'
        loop:
            - '/home/{{ project_user }}/.local'
            - '/home/{{ project_user }}/.local/bin'
            - '/home/{{ project_user }}/.cache'
            - '/home/{{ project_user }}/.config'
            - '/home/{{ project_user }}/.npm'
        become: yes

      - name: Ensure enabled AI tool directories are writable
        file:
            path: '{{ item.path }}'
            state: directory
            owner: '{{ project_user }}'
            group: '{{ project_user_group }}'
            mode: '0755'
        loop:
            - path: '/home/{{ project_user }}/.claude'
              enabled: '{{ claude_sync_enabled }}'
            - path: '/home/{{ project_user }}/.gemini'
              enabled: '{{ gemini_sync_enabled }}'
            - path: '/home/{{ project_user }}/.codex'
              enabled: '{{ codex_sync_enabled }}'
        when: item.enabled | bool
        become: yes

      - name: Configure Node.js toolchain
        shell: |
            set -euo pipefail
            source "/home/{{ project_user }}/.nvm/nvm.sh"
            nvm install {{ project_config.versions.node | default('22') }}
            nvm use {{ project_config.versions.node | default('22') }}
            nvm alias default {{ project_config.versions.node | default('22') }}
            npm install -g npm@{{ project_config.versions.npm | default('latest') }}
            corepack enable
            corepack prepare pnpm@{{ project_config.versions.pnpm | default('10.12.3') }} --activate
        args:
            executable: /bin/bash
        become_user: '{{ project_user }}'
        when: nodejs_required and not base_preprovisioned

      # Layered provisioning: works for both fresh builds and snapshots.
      # When refresh_packages is true, upgrade configured packages to the latest available version.
      - name: Install additional APT packages
        apt:
            name: "{{ project_config.apt_packages | default([]) }}"
            state: "{{ 'latest' if refresh_packages else 'present' }}"
            update_cache: "{{ refresh_packages }}"
            lock_timeout: 300
        when: apt_packages_required
        register: apt_packages_install
        retries: 3
        delay: 5
        until: apt_packages_install is succeeded


      # AI CLI tools - install even for snapshots if sync is enabled (layered provisioning)
      - name: Install Claude Code CLI
        shell: |
            set -euo pipefail
            export HOME="/home/{{ project_user }}"
            mkdir -p "$HOME/.local/bin"
            export PATH="$HOME/.local/bin:$PATH"

            ensure_claude_launcher() {
                if command -v claude >/dev/null 2>&1; then
                    return 0
                fi

                local native_bin=""
                native_bin="$(find "$HOME/.local/share/claude/versions" -maxdepth 1 -type f -perm /111 2>/dev/null | sort -V | tail -n 1 || true)"
                if [ -n "$native_bin" ]; then
                    ln -sf "$native_bin" "$HOME/.local/bin/claude"
                    hash -r
                fi

                command -v claude >/dev/null 2>&1
            }

            if command -v claude >/dev/null 2>&1; then
                echo "Claude Code CLI already installed"
            else
                INSTALLER="$(mktemp)"
                trap 'rm -f "$INSTALLER"' EXIT
                curl -fsSL https://claude.ai/install.sh -o "$INSTALLER"
                bash "$INSTALLER"
                if ! ensure_claude_launcher; then
                    echo "Claude Code installer completed, but no claude launcher was found." >&2
                    echo "Searched PATH: $PATH" >&2
                    find "$HOME/.local" "$HOME/.claude" -maxdepth 8 -printf '%M %p -> %l\n' 2>/dev/null || true
                    exit 1
                fi
                command -v claude
                echo "Claude Code CLI installed"
            fi
        args:
            executable: /bin/bash
        become_user: '{{ project_user }}'
        when: claude_sync_enabled
        register: claude_install
        changed_when: "'installed' in claude_install.stdout and 'already' not in claude_install.stdout"

      - name: Install Gemini CLI
        shell: |
            set -euo pipefail
            export HOME="/home/{{ project_user }}"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            NPM_BIN="$(npm prefix -g)/bin"
            export PATH="$NPM_BIN:$HOME/.local/bin:$PATH"
            if command -v gemini >/dev/null 2>&1; then
                echo "Gemini CLI already installed"
            else
                npm install -g @google/gemini-cli
                command -v gemini
            fi
        args:
            executable: /bin/bash
        become_user: '{{ project_user }}'
        when: gemini_sync_enabled
        register: gemini_install
        changed_when: "'already installed' not in gemini_install.stdout"

      - name: Install Codex CLI
        shell: |
            set -euo pipefail
            export HOME="/home/{{ project_user }}"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            NPM_BIN="$(npm prefix -g)/bin"
            export PATH="$NPM_BIN:$HOME/.local/bin:$PATH"
            if command -v codex >/dev/null 2>&1; then
                echo "Codex CLI already installed"
            else
                npm install -g @openai/codex
                command -v codex
            fi
        args:
            executable: /bin/bash
        become_user: '{{ project_user }}'
        when: codex_sync_enabled
        register: codex_install
        changed_when: "'already installed' not in codex_install.stdout"

      - name: Install container pipx packages
        shell: |
            set -euo pipefail
            pipx install {{ item }}
        become_user: '{{ project_user }}'
        loop: "{{ project_config.container_pipx_packages | default([]) }}"
        when: project_config.container_pipx_packages is defined and project_config.container_pipx_packages | length > 0

      # Python build tools - only update for fresh builds (snapshots have them)
      - name: Ensure Python build tools are up-to-date
        pip:
          name:
            - pip
            - setuptools
            - wheel
          state: latest
          extra_args: '--user --break-system-packages'
          executable: pip3
        become_user: '{{ project_user }}'
        when: not base_preprovisioned

      - name: Ensure pnpm is activated by Corepack
        shell: |
            set -euo pipefail
            [ -s "/home/{{ project_user }}/.nvm/nvm.sh" ] && source "/home/{{ project_user }}/.nvm/nvm.sh"
            corepack enable
            corepack prepare pnpm@{{ project_config.versions.pnpm | default('10.12.3') }} --activate
            command -v pnpm
        args:
            executable: /bin/bash
        become_user: '{{ project_user }}'
        when: project_config.versions.pnpm is defined
        register: pnpm_corepack
        changed_when: "'Preparing pnpm' in pnpm_corepack.stdout"

      # ================================================================================
      # CONDITIONAL PACKAGE MANAGER INSTALLATIONS
      # Only install package managers when their respective packages are defined
      # ================================================================================

      # Install Rust/Cargo if cargo_packages is defined
      - name: Check if Rust is already installed
        stat:
          path: '{{ home_dir }}/.cargo/bin/cargo'
        register: cargo_installed
        become_user: '{{ project_user }}'
        when: cargo_packages_required

      - name: Install Rust via rustup
        when: cargo_packages_required and not cargo_installed.stat.exists
        block:
          - name: Download rustup installer
            get_url:
              url: https://sh.rustup.rs
              dest: /tmp/rustup.sh
              mode: '0755'
            become_user: '{{ project_user }}'

          - name: Install Rust
            shell: |
              /tmp/rustup.sh -y --default-toolchain {{ project_config.versions.rust | default('stable') }} --no-modify-path
            args:
              executable: /bin/bash
            become_user: '{{ project_user }}'
            environment:
              CARGO_HOME: '{{ home_dir }}/.cargo'
              RUSTUP_HOME: '{{ home_dir }}/.rustup'

          - name: Clean up rustup installer
            file:
              path: /tmp/rustup.sh
              state: absent


      # Install pip and pipx if pip_packages is defined
      - name: Install pipx for Python package management
        apt:
            name: pipx
            state: present
            update_cache: yes
            lock_timeout: 300
        when: pip_packages_required
        register: pipx_install
        retries: 3
        delay: 5
        until: pipx_install is succeeded

      - name: Ensure pip is installed for Python libraries
        apt:
            name: python3-pip
            state: present
            update_cache: yes
            lock_timeout: 300
        when: pip_packages_required
        register: pip_install_apt
        retries: 3
        delay: 5
        until: pip_install_apt is succeeded

      # ================================================================================
      # PACKAGE INSTALLATIONS
      # Install packages for each configured package manager
      # ================================================================================



      # Load service definitions
      - name: Load service definitions
        include_vars: /app/shared/services/service_definitions.yml

      # Install and configure all enabled services using reusable task
      - name: Install and configure enabled services
        include_tasks: tasks/manage-service.yml
        vars:
          service_name: "{{ service_item.key }}"
          service_config: "{{ service_item.value }}"
          # Consolidated service definition access with defaults
          current_service_def: "{{ service_definitions[service_item.key] | default({}) }}"
          service_packages: "{{ current_service_def.service_packages | default([]) }}"
          service_dependencies: "{{ current_service_def.service_dependencies | default([]) }}"
          service_pre_install_commands: "{{ current_service_def.service_pre_install_commands | default([]) }}"
          service_gpg_key_url: "{{ current_service_def.service_gpg_key_url | default('') }}"
          service_repository: "{{ current_service_def.service_repository | default('') }}"
          service_config_lines: "{{ current_service_def.service_config_lines | default([]) }}"
          service_version_command: "{{ current_service_def.service_version_command | default('') }}"
          service_versioned_config_lines: "{{ current_service_def.service_versioned_config_lines | default([]) }}"
          service_systemd_name: "{{ current_service_def.service_systemd_name | default('') }}"
          service_systemd_daemon_reload: "{{ current_service_def.service_systemd_daemon_reload | default(false) }}"
          service_supervisor_command: "{{ current_service_def.service_supervisor_command | default('') }}"
          service_supervisor_user: "{{ current_service_def.service_supervisor_user | default('') }}"
          service_supervisor_environment: "{{ current_service_def.service_supervisor_environment | default('') }}"
          service_port: "{{ current_service_def.service_port | default('') }}"
          service_post_install_commands: "{{ current_service_def.service_post_install_commands | default([]) }}"
        loop: "{{ project_config.services | dict2items }}"
        loop_control:
          loop_var: service_item
        when:
          - service_item.value.enabled | default(false)
          - service_item.key in service_definitions
          - service_item.key != 'docker'  # Docker handled separately due to user group requirements
          - not (is_docker_container and service_item.key in ['postgresql', 'redis', 'mongodb'])  # These run as separate containers in Docker

      # Install database client tools for services that run as separate containers in Docker
      # Layered provisioning: install if not already present (works for both fresh and snapshot builds)
      - name: Install PostgreSQL client tools for Docker
        apt:
            name: postgresql-client
            state: present
            update_cache: yes
            lock_timeout: 300
        when:
          - is_docker_container
          - project_config.services.postgresql.enabled | default(false)

      - name: Install Redis client tools for Docker
        apt:
            name: redis-tools
            state: present
            update_cache: yes
            lock_timeout: 300
        when:
          - is_docker_container
          - project_config.services.redis.enabled | default(false)

      - name: Install MongoDB client tools for Docker
        apt:
            name: mongodb-clients
            state: present
            update_cache: yes
            lock_timeout: 300
        when:
          - is_docker_container
          - project_config.services.mongodb.enabled | default(false)

      # Handle Docker service separately (requires user group management)
      # Layered provisioning: install if not already present
      - name: Install Docker
        apt:
            name:
              - docker.io
              - docker-compose
            state: present
            update_cache: yes
            lock_timeout: 300
        when:
          - project_config.services.docker.enabled | default(false)

      - name: Add user to docker group
        user:
            name: '{{ project_user }}'
            groups: docker
            append: yes
        when:
          - project_config.services.docker.enabled | default(false)

      # Handle special services that need additional configuration
      - name: Create Xvfb systemd service file
        copy:
            dest: /etc/systemd/system/xvfb.service
            content: |
                [Unit]
                Description=X Virtual Framebuffer
                After=network.target
                [Service]
                Type=simple
                ExecStart=/usr/bin/Xvfb :99 -screen 0 1024x768x24 -ac
                Restart=always
                [Install]
                WantedBy=multi-user.target
        when:
          - project_config.services.headless_browser.enabled | default(false)
          - not is_docker_container
        no_log: true

      # Claude Code setup
      - name: Create Claude settings directory
        file:
            path: '/home/{{ project_user }}/.claude'
            state: directory
            owner: '{{ project_user }}'
            mode: '0755'
        when: claude_sync_enabled

      - name: Render Claude settings
        template:
            src: /app/shared/claude-settings/settings.json.j2
            dest: '/home/{{ project_user }}/.claude/settings.json'
            owner: '{{ project_user }}'
        when: claude_sync_enabled

      # Gemini CLI setup
      - name: Create Gemini settings directory
        file:
            path: '/home/{{ project_user }}/.gemini'
            state: directory
            owner: '{{ project_user }}'
            mode: '0755'
        when: gemini_sync_enabled

      - name: Check for project Gemini settings
        stat:
            path: '/app/shared/gemini-settings/settings.json'
        register: gemini_settings
        when: gemini_sync_enabled

      - name: Copy project Gemini settings
        copy:
            src: '/app/shared/gemini-settings/settings.json'
            dest: '/home/{{ project_user }}/.gemini/settings.json'
            remote_src: yes
            owner: '{{ project_user }}'
        when:
            - gemini_sync_enabled
            - gemini_settings is defined
            - gemini_settings.stat.exists

      - name: Use default Gemini settings
        copy:
            dest: '/home/{{ project_user }}/.gemini/settings.json'
            owner: '{{ project_user }}'
            content: |
                {
                  "model": "gemini-2.5-pro",
                  "interactive": true
                }
        when:
            - gemini_sync_enabled
            - gemini_settings is defined
            - not gemini_settings.stat.exists
        no_log: true


      # Project-specific environment setup
      - name: Check for .env template
        stat:
            path: '{{ project_path }}/{{ project_config.project.env_template_path }}'
        register: env_template
        when: env_template_configured

      - name: Copy .env template
        copy:
            src: '{{ project_path }}/{{ project_config.project.env_template_path }}'
            dest: '{{ project_path }}/{{ project_config.project.env_template_path | dirname }}/.env'
            remote_src: yes
            owner: '{{ project_user }}'
        when:
            - env_template_configured
            - env_template.stat.exists

      - name: Configure DATABASE_URL in .env
        lineinfile:
            path: '{{ project_path }}/{{ project_config.project.env_template_path | dirname }}/.env'
            regexp: '^DATABASE_URL='
            line: "DATABASE_URL=postgresql://{{ project_config.services.postgresql.user | default('postgres') }}:{{ project_config.services.postgresql.password | default('postgres') }}@localhost:{{ project_config.services.postgresql.port | default(5432) }}/{{ project_config.services.postgresql.database }}"
        when:
            - env_template_configured
            - env_template.stat.exists
            - project_config.services.postgresql.enabled | default(false)

      - name: Configure REDIS_URL in .env
        lineinfile:
            path: '{{ project_path }}/{{ project_config.project.env_template_path | dirname }}/.env'
            regexp: '^REDIS_URL='
            line: 'REDIS_URL=redis://localhost:{{ project_config.services.redis.port | default(6379) }}'
        when:
            - env_template_configured
            - env_template.stat.exists
            - project_config.services.redis.enabled | default(false)


      # Check for lock files
      - name: Check for pnpm-lock.yaml
        stat:
            path: '{{ project_path }}/pnpm-lock.yaml'
        register: pnpm_lock

      - name: Check for package-lock.json
        stat:
            path: '{{ project_path }}/package-lock.json'
        register: npm_lock

      - name: Check for yarn.lock (legacy)
        stat:
            path: '{{ project_path }}/yarn.lock'
        register: yarn_lock

      # Install project dependencies
      - name: Install pnpm dependencies
        shell: |
            set -euo pipefail
            export NVM_DIR="/home/{{ project_user }}/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd {{ project_path | quote }}
            pnpm install
        args:
            executable: /bin/bash
        become_user: '{{ project_user }}'
        async: 1800 # 30 minutes timeout
        poll: 30 # Check every 30 seconds
        when:
            - config_file_stat.stat.exists
            - pnpm_lock.stat.exists

      - name: Check if build script exists
        shell: |
            set -euo pipefail
            export NVM_DIR="/home/{{ project_user }}/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd {{ project_path | quote }}
            if pnpm run --silent list | grep -q "build"; then
              echo "build_exists"
            else
              echo "no_build"
            fi
        args:
            executable: /bin/bash
        become_user: '{{ project_user }}'
        register: build_check
        when:
            - config_file_stat.stat.exists
            - pnpm_lock.stat.exists

      - name: Run build script if it exists
        shell: |
            set -euo pipefail
            export NVM_DIR="/home/{{ project_user }}/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd {{ project_path | quote }}
            pnpm build
        args:
            executable: /bin/bash
        become_user: '{{ project_user }}'
        when:
            - config_file_stat.stat.exists
            - pnpm_lock.stat.exists
            - build_check.stdout == "build_exists"

      - name: Install NPM dependencies
        shell: |
            set -euo pipefail
            export NVM_DIR="/home/{{ project_user }}/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd {{ project_path | quote }}
            npm install
        args:
            executable: /bin/bash
        become_user: '{{ project_user }}'
        when:
            - config_file_stat.stat.exists
            - npm_lock.stat.exists
            - not pnpm_lock.stat.exists

      # Git configuration
      - name: Configure Git user name for snapshot-based boxes
        command: git config --global user.name "{{ project_config.git_config.user_name }}"
        become_user: '{{ project_user }}'
        when:
          - base_preprovisioned | bool
          - project_config.git_config is defined
          - project_config.git_config.user_name is defined
          - project_config.git_config.user_name is not none

      - name: Configure Git user email for snapshot-based boxes
        command: git config --global user.email "{{ project_config.git_config.user_email }}"
        become_user: '{{ project_user }}'
        when:
          - base_preprovisioned | bool
          - project_config.git_config is defined
          - project_config.git_config.user_email is defined
          - project_config.git_config.user_email is not none

      - name: Configure Git pull.rebase for snapshot-based boxes
        command: git config --global pull.rebase "{{ project_config.git_config.pull_rebase }}"
        become_user: '{{ project_user }}'
        when:
          - base_preprovisioned | bool
          - project_config.git_config is defined
          - project_config.git_config.pull_rebase is defined
          - project_config.git_config.pull_rebase is not none

      - name: Configure Git default branch for snapshot-based boxes
        command: git config --global init.defaultBranch "{{ project_config.git_config.init_default_branch }}"
        become_user: '{{ project_user }}'
        when:
          - base_preprovisioned | bool
          - project_config.git_config is defined
          - project_config.git_config.init_default_branch is defined
          - project_config.git_config.init_default_branch is not none

      - name: Configure Git editor for snapshot-based boxes
        command: git config --global core.editor "{{ project_config.git_config.core_editor }}"
        become_user: '{{ project_user }}'
        when:
          - base_preprovisioned | bool
          - project_config.git_config is defined
          - project_config.git_config.core_editor is defined
          - project_config.git_config.core_editor is not none

      - name: Write global gitignore for snapshot-based boxes
        copy:
            dest: '/home/{{ project_user }}/.gitignore_global'
            content: '{{ project_config.git_config.core_excludesfile_content }}'
            owner: '{{ project_user }}'
            mode: '0644'
        when:
          - base_preprovisioned | bool
          - project_config.git_config is defined
          - project_config.git_config.core_excludesfile_content is defined
          - project_config.git_config.core_excludesfile_content is not none
        no_log: true

      - name: Configure Git excludesfile for snapshot-based boxes
        command: git config --global core.excludesfile "/home/{{ project_user }}/.gitignore_global"
        become_user: '{{ project_user }}'
        when:
          - base_preprovisioned | bool
          - project_config.git_config is defined
          - project_config.git_config.core_excludesfile_content is defined
          - project_config.git_config.core_excludesfile_content is not none

      - name: Configure Git safe directory
        command: git config --global --add safe.directory {{ project_path }}
        become_user: '{{ project_user }}'

      # Enable UFW after all rules are configured.
      - name: Set UFW default incoming policy
        command:
            argv:
              - ufw
              - default
              - deny
              - incoming
        register: ufw_default_policy
        changed_when: "'Default incoming policy changed' in ufw_default_policy.stdout"
        when: not is_docker_container

      - name: Enable UFW logging
        command:
            argv:
              - ufw
              - logging
              - 'on'
        register: ufw_logging
        changed_when: "'Logging enabled' in ufw_logging.stdout"
        when: not is_docker_container

      - name: Enable UFW
        command:
            argv:
              - ufw
              - --force
              - enable
        register: ufw_enable
        changed_when: "'Firewall is active and enabled' in ufw_enable.stdout"
        notify: restart ssh
        when: not is_docker_container

      # Ensure supervisor is started and services are loaded in Docker

      # Final message
      - name: Display completion message
        debug:
            msg: |
                🎉 Development environment configured!

                📁 Project: {{ project_name }}
                📍 Path: {{ project_path }}
                🛠️ Tools: Node.js, Claude Code, Gemini CLI, Codex

                💡 Ready to code!
